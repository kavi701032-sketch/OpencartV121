version: "3.8"

services:
  selenium-hub:
    image: selenium/hub:4.34.0
    ports:
      - "4444:4444"
    networks:
      - selenium-grid

  chrome:
    image: selenium/node-chrome:4.34.0
    shm_size: "2gb"
    depends_on:
      - selenium-hub
    networks:
      - selenium-grid

  firefox:
    image: selenium/node-firefox:4.34.0
    shm_size: "2gb"
    depends_on:
      - selenium-hub
    networks:
      - selenium-grid

networks:
  selenium-grid:
    name: selenium-grid